<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descubra seus Dons - Igreja Batista do Estoril</title>
    <style>
        :root {
            --blue-dark: #0c245b;
            --blue-light: #07248E;
            --white: #ffffff;
            --text-gray: #333333;
            --bg-light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-gray);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--blue-dark), var(--blue-light));
            color: var(--white);
            text-align: center;
            padding: 50px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.2em;
            letter-spacing: 1px;
        }

        header h2 {
            margin: 15px 0 0 0;
            font-size: 1.3em;
            font-weight: 300;
            font-style: italic;
            opacity: 0.9;
        }

        .main-content {
            flex: 1;
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        .test-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        @media (min-width: 600px) {
            .test-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .test-card {
            background-color: var(--white);
            border-radius: 12px;
            padding: 40px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            border-top: 6px solid var(--blue-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .test-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .test-card h3 {
            color: var(--blue-dark);
            margin: 0 0 25px 0;
            font-size: 1.5em;
        }

        .btn {
            display: inline-block;
            background-color: var(--blue-light);
            color: var(--white);
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1em;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: var(--blue-dark);
        }

        footer {
            text-align: center;
            padding: 25px;
            background-color: var(--blue-dark);
            color: var(--white);
            font-size: 0.95em;
            margin-top: auto;
        }

        footer p {
            margin: 5px 0;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <header>
        <h1>Igreja Batista do Estoril</h1>
        <h2>Sob a cruz de Cristo, para a glória de Deus</h2>
    </header>

    <div class="main-content">
        <div class="test-grid">
            <div class="test-card">
                <h3>Levantamento de Dons I</h3>
                <a href="teste1.html" class="btn">Fazer o Teste I</a>
            </div>

            <div class="test-card">
                <h3>Levantamento de Dons II</h3>
                <a href="teste2.html" class="btn">Fazer o Teste II</a>
            </div>
        </div>
    </div>

    <footer>
        <p><strong>Igreja Batista do Estoril</strong></p>
        <p>Bauru - SP</p>
    </footer>

</body>
</html>
