<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levantamento de Dons II - Igreja Batista do Estoril</title>
    <style>
        /* Estilos idênticos ao teste 1 para manter o padrão */
        :root { --blue-dark: #0c245b; --blue-light: #07248E; --bg-color: #f8f9fa; --error-color: #dc2626; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2, h3 { color: var(--blue-dark); text-align: center; }
        h1 { border-bottom: 3px solid var(--blue-light); padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; background-color: #eef2f7; padding: 20px; border-radius: 8px; border-left: 5px solid var(--blue-light); }
        .input-group input { width: 100%; padding: 12px; font-size: 1.1em; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .privacy-notice { background-color: #fee2e2; color: #991b1b; padding: 12px; border-radius: 6px; font-size: 0.9em; margin-bottom: 20px; text-align: center; }
        .legend { background-color: #fff3cd; border-left: 5px solid #ffc107; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9em; }
        .question-card { border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 12px; border-radius: 8px; }
        .question-card.error-highlight { border: 2px solid var(--error-color); background-color: #fef2f2; }
        .options-group { display: flex; justify-content: space-around; background-color: #f8fafc; padding: 10px; border-radius: 8px; }
        .radio-label { display: flex; flex-direction: column; align-items: center; cursor: pointer; font-weight: bold; }
        .submit-btn, .print-btn { display: block; width: 100%; padding: 15px; color: #fff; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .submit-btn { background-color: var(--blue-light); }
        .print-btn { background-color: #10b981; }
        #results { display: none; margin-top: 40px; }
        .top-gifts { background-color: #f0fdf4; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #bbf7d0; }
        .gift-item-top { padding: 10px; background: #fff; margin: 8px 0; border-left: 5px solid #22c55e; font-weight: bold; }
        .other-gifts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .gift-item-other { background: #f1f5f9; padding: 8px; border-radius: 4px; font-size: 0.85em; text-align: center; }
        .answer-log { margin-top: 30px; border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        .log-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; margin-top: 10px; }
        .log-box { background: #eee; padding: 4px; font-size: 0.8em; text-align: center; border-radius: 3px; }
        @media print { .no-print { display: none !important; } #results { display: block !important; } .answer-log { page-break-before: always; } }
    </style>
</head>
<body>
<div class="container">
    <h1 class="no-print">Levantamento de Dons II</h1>
    <form id="gifts-form" class="no-print">
        <div class="input-group">
            <label>Nome do Participante:</label>
            <input type="text" id="p_nome" name="n_p_r_rand" autocomplete="off" autocorrect="off" required>
        </div>
        <div class="privacy-notice">Os dados não são salvos em nosso sistema.</div>
        <div class="legend"><strong>LEGENDA:</strong> 3 (Exato) | 2 (Forte Tendência) | 1 (Inclinação) | 0 (Não se aplica)</div>
        <div id="questions-container"></div>
        <button type="submit" class="submit-btn">Calcular Resultados</button>
    </form>
    <div id="results">
        <h2>Resultado: <span id="res-nome"></span></h2>
        <div class="top-gifts"><div id="top-list"></div></div>
        <div class="other-gifts" id="other-list"></div>
        <button onclick="window.print()" class="print-btn no-print">🖨️ Imprimir / PDF</button>
        <div class="answer-log"><h3>Respostas Marcadas</h3><div class="log-grid" id="res-log"></div></div>
    </div>
</div>
<script>
    const questions = [
        "Gosto de apresentar a verdade de Deus numa forma interessante e entusiasta.", "Estou sempre pronto para colocar em posição secundária meu conforto pessoal a fim de que as necessidades alheias sejam satisfeitas.", "Tenho facilidade para explorar a verdade de um texto dentro do seu contexto.", "Procuro incentivar individualmente os que vacilam e tem problemas espirituais.", "Administro meu dinheiro, mesmo quando pouco, de modo a separar uma quantia generosa para o trabalho de Deus.", "Acho fácil delegar responsabilidades e preparar outras pessoas para realizações no campo espiritual.", "Sou muito sensível às necessidades dos outros.", "Acho fácil falar de Jesus para não crentes.", "Gosto de acompanhar cristãos para ajudá-los no seu crescimento espiritual.", "Quando tento persuadir pessoas a respeito de suas reais motivações, faço-o de modo muito convincente.", "Consigo levar pessoas a se sentirem à vontade na minha presença.", "Sinto grande impulso para descobrir conceitos bíblicos e repassá-los a outros.", "Sempre estou interessado e procuro ajudar o crescimento espiritual das pessoas...", "Alegro-me em dar recursos materiais, de sorte que a obra do Senhor possa ser promovida.", "Sou eficiente em supervisionar as atividades dos outros.", "Gosto de visitar pessoas hospitalizadas ou que não podem sair de casa.", "Já tive experiências de levar outros à fé em Jesus.", "Tenho experiência de levar cristãos a permanecerem firmes na fé devido ao meu acompanhamento.", "Posso apresentar a Palavra de Deus a uma congregação de pessoas com clareza...", "Sinto-me feliz quando solicitado a dar assistência a outros na obra do Senhor...", "Sou muito interessado em apresentar conceitos bíblicos de modo bem claro...", "Sinto-me feliz por poder tratar as pessoas feridas espiritualmente.", "Não tenho nenhum problema em confiar os meus recursos a outros...", "Posso planejar as ações de outras pessoas, com calma, e dar-lhes os detalhes...", "Tenho grande interesse pelos que se acham envolvidos em dificuldades.", "Considero um grande problema o fato de muitos cristãos não falarem aos outros...", "Preocupo-me com o fato de que muitos cristãos não receberem um acompanhamento...", "Esforço-me grandemente para obter resultados sempre que apresento as verdades...", "Sinto-me bem quando proporciono um agradável acolhimento aos hóspedes.", "Sou diligente em meu estudo da Bíblia e dispenso cuidadosa atenção à necessária pesquisa.", "Julgo poder ajudar os que têm necessidades de aconselhamento sobre problemas pessoais.", "Preocupo-me em saber que o trabalho de assistência social está sendo suprido de recursos.", "Procuro estar ciente dos recursos disponíveis para a execução das tarefas.", "Sinto-me feliz quando consigo atingir pessoas geralmente esquecidas pelos outros.", "Para mim é fácil perceber quando uma pessoa está aberta a aceitar o evangelho.", "É fácil para mim acompanhar pessoalmente um grupo de cristãos e me empenhar pela sua unidade.", "Verifico que minha pregação leve pessoas a um ponto de decisão definido.", "Gosto de aliviar a carga das pessoas que ocupam uma posição-chave.", "Posso explicar bem como a Bíblia mantém sua unidade.", "Sou agudamente consciente das coisas que impedem as pessoas em seu desenvolvimento espiritual.", "Sou cuidadoso com a questão de dinheiro e oro continuamente acerca de sua distribuição.", "Tenho objetivos bem definidos e consigo levar outros a assumirem meus objetivos.", "Posso relacionar-me com outras pessoas emocionalmente e me disponho a ajudá-las.", "Estou disposto a freqüentar um curso preparatório para o evangelismo.", "Estou disposto a assumir a responsabilidade por um grupo de irmãos."
    ];
    const categories = ["Profecia", "Serviço", "Ensino", "Exortação", "Contribuição", "Governo", "Misericórdia", "Evangelista", "Pastor"];
    const container = document.getElementById('questions-container');
    questions.forEach((q, i) => {
        const div = document.createElement('div'); div.className = 'question-card'; div.id = `q-${i}`;
        div.innerHTML = `<div class="question-text">${i+1}. ${q}</div><div class="options-group">
            ${[0,1,2,3].map(v => `<label class="radio-label">${v}<input type="radio" name="r${i}" value="${v}" required onchange="document.getElementById('q-${i}').classList.remove('error-highlight')"></label>`).join('')}
        </div>`;
        container.appendChild(div);
    });
    document.getElementById('gifts-form').onsubmit = (e) => {
        e.preventDefault();
        const nome = document.getElementById('p_nome').value;
        let scores = new Array(9).fill(0);
        let log = ''; let missing = false;
        for(let i=0; i<questions.length; i++){
            const rb = document.querySelector(`input[name="r${i}"]:checked`);
            if(!rb){ document.getElementById(`q-${i}`).classList.add('error-highlight'); missing = true; }
            else { scores[i % 9] += parseInt(rb.value); log += `<div class="log-box">${i+1} - ${rb.value}</div>`; }
        }
        if(missing) return;
        document.getElementById('res-nome').innerText = nome;
        document.getElementById('res-log').innerHTML = log;
        let results = categories.map((n, i) => ({n, s: scores[i]})).sort((a,b) => b.s - a.s);
        document.getElementById('top-list').innerHTML = results.slice(0,3).map((r,i) => `<div class="gift-item-top">${i+1}º ${r.n} (${r.s} pts)</div>`).join('');
        document.getElementById('other-list').innerHTML = results.slice(3).map((r,i) => `<div class="gift-item-other">${r.n}: ${r.s}</div>`).join('');
        document.getElementById('results').style.display = 'block';
        window.scrollTo({top: document.getElementById('results').offsetTop - 20, behavior: 'smooth'});
    };
</script>
</body>
</html>
